{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sign in{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'plugins/bootstrap5/css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'plugins/bootstrap-icons/font/bootstrap-icons.css' %}">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <style>
    body { background: var(--sidebar-bg); display: grid; place-items: center; min-height: 100vh; }
    .auth-card { width: min(380px, 92vw); }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="text-center text-white mb-3">
      <h1 class="h4 mb-0">Emporium Armani</h1>
      <p class="text-white-50 small">Sign in to continue</p>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label" for="id_username">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" id="id_username" class="form-control"
                     autocomplete="username" autofocus required>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="id_password">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" id="id_password" class="form-control"
                     autocomplete="current-password" required>
            </div>
          </div>

          {% if form.errors %}
            <div class="alert alert-danger py-2 small">Incorrect username or password. Try again.</div>
          {% endif %}

          <button type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
