{% extends "base.html" %}
{% load static %}

{% block title %}Dashboard{% endblock %}

{% block content %}

  <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
    <h1 class="h4 mb-0">Dashboard</h1>
    {% if not request.user.is_tenant %}
      <a href="{% url 'orders:order_add' %}" class="btn btn-primary">
        <i class="bi bi-plus-lg"></i> New order
      </a>
    {% endif %}
  </div>

  <!-- Stat cards (OOB-swappable after create/delete) -->
  {% include "admin_dashboard/partials/_stat_cards.html" %}

  <div class="card mt-3">
    <div class="card-header bg-white fw-semibold">Orders</div>
    <div class="card-body p-0">
      <!-- Table region: loads on page load, and on the custom "refresh" event fired after save/delete -->
      <div id="orders-region"
           hx-get="{% url 'orders:orders_table' %}"
           hx-trigger="load, refresh"
           hx-swap="innerHTML">
        <div class="text-center text-muted py-5">
          <div class="spinner-border" role="status"></div>
        </div>
      </div>
    </div>
  </div>

{% endblock %}
