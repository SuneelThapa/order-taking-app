<script>
document.addEventListener("change", function(e) {

    // ===============================
    // LOAD MEASUREMENT FORM
    // ===============================
    if (e.target.name.includes("product_type")) {

        let select = e.target;
        let productTypeId = select.value;

        if (!productTypeId) return;

        let itemPrefix = select.name.replace("-product_type", "");

        let container = select.closest(".border")
            .querySelector("[id^='measurement-container-']");

        fetch(`/load-measurement-form/?product_type=${productTypeId}&prefix=${itemPrefix}`)
            .then(response => response.text())
            .then(html => {
                container.innerHTML = html;
            });
    }

    // ===============================
    // 🔥 LIVE IMAGE PREVIEW
    // ===============================
    if (e.target.type === "file" && e.target.name.includes("image")) {

        const fileInput = e.target;
        const file = fileInput.files[0];

        if (!file) return;

        const reader = new FileReader();

        reader.onload = function(event) {

            const formContainer = fileInput.closest(".photo-form");
            const previewImage = formContainer.querySelector(".image-preview");

            previewImage.src = event.target.result;
            previewImage.classList.remove("d-none");
        };

        reader.readAsDataURL(file);
    }
});




// ===============================
// ADD PHOTO
// ===============================
document.addEventListener("click", function(e){

    if(!e.target.classList.contains("add-photo-btn")) return;

    let prefix = e.target.dataset.prefix;

    let totalForms = document.querySelector(`#id_${prefix}-TOTAL_FORMS`);

    if(!totalForms){
        console.error("TOTAL_FORMS not found:", prefix);
        return;
    }

    let count = parseInt(totalForms.value);

    // Detect item index (for cloned items)
    let itemIndex = null;
    if(prefix.includes("items")){
        itemIndex = prefix.split("-")[2];
    }

    // ===============================
    // FIND EMPTY TEMPLATE
    // ===============================
    let emptyTemplate =
        document.querySelector(`#empty-form-${prefix}`) ||
        document.querySelector(`#empty-form-items-${itemIndex}`);

    if(!emptyTemplate){
        console.error("Empty form template not found:", prefix);
        return;
    }

    let templateHTML = emptyTemplate.innerHTML;

    let newForm;

    // ===============================
    // HANDLE CLONED ORDER ITEM
    // ===============================
    if(templateHTML.includes("__photo_prefix__")){

        newForm = templateHTML
            .replace(/__photo_prefix__/g, count)
            .replace(/__prefix__/g, itemIndex);

    }

    // ===============================
    // HANDLE ORIGINAL ORDER ITEM
    // ===============================
    else{

        newForm = templateHTML.replace(/__prefix__/g, count);

    }

    // ===============================
    // FIND TARGET CONTAINER
    // ===============================
    let container =
        document.querySelector(`#photo-forms-${prefix}`) ||
        document.querySelector(`#photo-forms-items-${itemIndex}`);

    if(!container){
        console.error("Photo container not found:", prefix);
        return;
    }

    container.insertAdjacentHTML("beforeend", newForm);

    totalForms.value = count + 1;

});






// ===============================
// ADD ORDER ITEM
// ===============================

document.addEventListener("click", function(e){

    if(e.target.id === "add-item-btn"){

        let totalForms = document.querySelector('#id_items-TOTAL_FORMS');

        if(!totalForms){
            console.error("TOTAL_FORMS not found");
            return;
        }

        let count = parseInt(totalForms.value);

        let template = document.querySelector("#empty-item-form").innerHTML;

        let newItem = template.replace(/__prefix__/g, count);

        document.querySelector("#order-items-container")
            .insertAdjacentHTML("beforeend", newItem);

        totalForms.value = count + 1;

    }

});







// ===============================
// customer photo preview Upload
// ===============================

document.addEventListener("change", function(e){

    if(e.target.type === "file"){

        const fileInput = e.target;
        const card = fileInput.closest(".card");

        if(!card) return;

        const preview = card.querySelector(".preview-img");

        if(!preview) return;

        const file = fileInput.files[0];

        if(file){

            const reader = new FileReader();

            reader.onload = function(event){
                preview.src = event.target.result;
                preview.classList.remove("d-none");
            };

            reader.readAsDataURL(file);

        }

    }

});



</script>





<!-- Scratch note writing script-->
<script>

const canvas = document.getElementById("scratchCanvas");

if (canvas) {

    const ctx = canvas.getContext("2d");

    let drawing = false;
    let history = [];
    let erasing = false;

    const NORMAL_WIDTH = 1200;
    const NORMAL_HEIGHT = 800;

    const penSizeSelector = document.getElementById("penSize");
    const penColorPicker = document.getElementById("penColor");
    const eraserBtn = document.getElementById("eraserTool");

    function fillWhite(){
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    fillWhite();

    // =============================
    // SAVE HISTORY (FOR UNDO)
    // =============================

    function saveState(){

        history.push(canvas.toDataURL());

        if(history.length > 30){
            history.shift();
        }

    }

    // save initial blank canvas
    saveState();

    // =============================
    // ERASER TOOL
    // =============================

    // =============================
    // ERASER TOOL
    // =============================

    if (eraserBtn) {

        eraserBtn.onclick = function () {

            erasing = !erasing;

            if (erasing) {

                eraserBtn.classList.remove("btn-outline-danger");
                eraserBtn.classList.add("btn-danger");
                canvas.style.cursor = "crosshair";

            } else {

                eraserBtn.classList.remove("btn-danger");
                eraserBtn.classList.add("btn-outline-danger");
                canvas.style.cursor = "default";

            }

        }

    }

    // =============================
    // DRAW EVENTS
    // =============================

    canvas.addEventListener("mousedown", startDraw);
    canvas.addEventListener("mouseup", stopDraw);
    canvas.addEventListener("mouseleave", stopDraw);
    canvas.addEventListener("mousemove", draw);

    function startDraw(e){

        drawing = true;

        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
    }

    function stopDraw(){

        if(drawing){
            saveState();
        }

        drawing = false;
        ctx.beginPath();
    }

    function draw(e){

        if(!drawing) return;

        ctx.lineWidth = penSizeSelector.value;
        ctx.lineCap = "round";

        if(erasing){

            ctx.globalCompositeOperation = "destination-out";
            ctx.strokeStyle = "rgba(0,0,0,1)";

        }else{

            ctx.globalCompositeOperation = "source-over";
            ctx.strokeStyle = penColorPicker.value;

        }

        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
    }

    // =============================
    // UNDO
    // =============================

    const undoBtn = document.getElementById("undoCanvas");

    if(undoBtn){
        undoBtn.onclick = function(){

            if(history.length <= 1) return;

            history.pop(); // remove current state

            const previous = history[history.length - 1];

            const img = new Image();

            img.onload = function(){

                ctx.globalCompositeOperation = "source-over";

                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.drawImage(img,0,0);

            };

            img.src = previous;

        }
    }

    // =============================
    // CLEAR CANVAS
    // =============================

    const clearBtn = document.getElementById("clearCanvas");

    if(clearBtn){
        clearBtn.onclick = function(){

            ctx.clearRect(0,0,canvas.width,canvas.height);
            fillWhite();

            saveState();

        }
    }

    // =============================
    // EXPORT CANVAS
    // =============================

    function exportCanvas(){

        const tempCanvas = document.createElement("canvas");

        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;

        const tempCtx = tempCanvas.getContext("2d");

        tempCtx.fillStyle = "#ffffff";
        tempCtx.fillRect(0,0,tempCanvas.width,tempCanvas.height);

        tempCtx.drawImage(canvas,0,0);

        return tempCanvas.toDataURL("image/png");
    }

    // =============================
    // AUTO SAVE TO FORM
    // =============================

    const form = document.getElementById("orderForm");

    if(form){

        form.addEventListener("submit", function(){

            const dataURL = exportCanvas();

            document.getElementById("scratchCanvasImage").value = dataURL;

        });

    }

    // =============================
    // FULLSCREEN BUTTON
    // =============================

    const fullscreenBtn = document.getElementById("fullscreenCanvas");

    if(fullscreenBtn){

        fullscreenBtn.onclick = function(){

            if(!document.fullscreenElement){
                canvas.requestFullscreen();
            }else{
                document.exitFullscreen();
            }

        }

    }

    // =============================
    // HANDLE FULLSCREEN CHANGE
    // =============================

    document.addEventListener("fullscreenchange", function(){

        const imageData = canvas.toDataURL();

        if(document.fullscreenElement){

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

        }else{

            canvas.width = NORMAL_WIDTH;
            canvas.height = NORMAL_HEIGHT;

        }

        fillWhite();

        const img = new Image();

        img.onload = function(){
            ctx.drawImage(img,0,0,canvas.width,canvas.height);
        };

        img.src = imageData;

    });

}

</script>





</body>
</html>
