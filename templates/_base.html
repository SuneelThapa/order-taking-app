<script>
document.addEventListener("change", function(e) {

    // ===============================
    // LOAD MEASUREMENT FORM
    // ===============================
    if (e.target.name.includes("product_type")) {

        let select = e.target;
        let productTypeId = select.value;

        if (!productTypeId) return;

        let itemPrefix = select.name.replace("-product_type", "");

        let container = select.closest(".border")
            .querySelector("[id^='measurement-container-']");

        fetch(`/load-measurement-form/?product_type=${productTypeId}&prefix=${itemPrefix}`)
            .then(response => response.text())
            .then(html => {
                container.innerHTML = html;
            });
    }

    // ===============================
    // 🔥 LIVE IMAGE PREVIEW
    // ===============================
    if (e.target.type === "file" && e.target.name.includes("image")) {

        const fileInput = e.target;
        const file = fileInput.files[0];

        if (!file) return;

        const reader = new FileReader();

        reader.onload = function(event) {

            const formContainer = fileInput.closest(".photo-form");
            const previewImage = formContainer.querySelector(".image-preview");

            previewImage.src = event.target.result;
            previewImage.classList.remove("d-none");
        };

        reader.readAsDataURL(file);
    }
});




// ===============================
// ADD PHOTO
// ===============================
document.addEventListener("click", function(e){

    if(!e.target.classList.contains("add-photo-btn")) return;

    let prefix = e.target.dataset.prefix;

    let totalForms = document.querySelector(`#id_${prefix}-TOTAL_FORMS`);

    if(!totalForms){
        console.error("TOTAL_FORMS not found:", prefix);
        return;
    }

    let count = parseInt(totalForms.value);

    // Detect item index (for cloned items)
    let itemIndex = null;
    if(prefix.includes("items")){
        itemIndex = prefix.split("-")[2];
    }

    // ===============================
    // FIND EMPTY TEMPLATE
    // ===============================
    let emptyTemplate =
        document.querySelector(`#empty-form-${prefix}`) ||
        document.querySelector(`#empty-form-items-${itemIndex}`);

    if(!emptyTemplate){
        console.error("Empty form template not found:", prefix);
        return;
    }

    let templateHTML = emptyTemplate.innerHTML;

    let newForm;

    // ===============================
    // HANDLE CLONED ORDER ITEM
    // ===============================
    if(templateHTML.includes("__photo_prefix__")){

        newForm = templateHTML
            .replace(/__photo_prefix__/g, count)
            .replace(/__prefix__/g, itemIndex);

    }

    // ===============================
    // HANDLE ORIGINAL ORDER ITEM
    // ===============================
    else{

        newForm = templateHTML.replace(/__prefix__/g, count);

    }

    // ===============================
    // FIND TARGET CONTAINER
    // ===============================
    let container =
        document.querySelector(`#photo-forms-${prefix}`) ||
        document.querySelector(`#photo-forms-items-${itemIndex}`);

    if(!container){
        console.error("Photo container not found:", prefix);
        return;
    }

    container.insertAdjacentHTML("beforeend", newForm);

    totalForms.value = count + 1;

});






// ===============================
// ADD ORDER ITEM
// ===============================

document.addEventListener("click", function(e){

    if(e.target.id === "add-item-btn"){

        let totalForms = document.querySelector('#id_items-TOTAL_FORMS');

        if(!totalForms){
            console.error("TOTAL_FORMS not found");
            return;
        }

        let count = parseInt(totalForms.value);

        let template = document.querySelector("#empty-item-form").innerHTML;

        let newItem = template.replace(/__prefix__/g, count);

        document.querySelector("#order-items-container")
            .insertAdjacentHTML("beforeend", newItem);

        totalForms.value = count + 1;

    }

});







// ===============================
// customer photo preview Upload
// ===============================

document.addEventListener("change", function(e){

    if(e.target.type === "file"){

        const fileInput = e.target;
        const card = fileInput.closest(".card");

        if(!card) return;

        const preview = card.querySelector(".preview-img");

        if(!preview) return;

        const file = fileInput.files[0];

        if(file){

            const reader = new FileReader();

            reader.onload = function(event){
                preview.src = event.target.result;
                preview.classList.remove("d-none");
            };

            reader.readAsDataURL(file);

        }

    }

});



</script>















<script>

const canvas = document.getElementById("scratchCanvas");

if (canvas) {

const ctx = canvas.getContext("2d");

let drawing = false;
let history = [];
let erasing = false;

let lastTap = 0;

/* =============================
   DETECT IF USER DREW ANYTHING
============================= */

let hasDrawing = false;

/* =============================
   PINCH ZOOM VARIABLES
============================= */

let scale = 1;
let startDistance = 0;
let isPinching = false;

const NORMAL_WIDTH = 1200;
const NORMAL_HEIGHT = 800;

const penSizeSelector = document.getElementById("penSize");
const penColorPicker = document.getElementById("penColor");
const eraserBtn = document.getElementById("eraserTool");
const fullscreenBtn = document.getElementById("fullscreenCanvas");
const exitFullscreenBtn = document.getElementById("exitFullscreenCanvas");

const canvasContainer = document.getElementById("canvasFullscreenContainer");

canvas.style.touchAction = "none";


function fillWhite(){
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

fillWhite();

/* =============================
   SAVE HISTORY
============================= */

function saveState(){

    history.push(canvas.toDataURL());

    if(history.length > 30){
        history.shift();
    }

}

saveState();


/* =============================
   ERASER TOOL
============================= */

if (eraserBtn){

eraserBtn.onclick = function(){

    erasing = !erasing;

    if(erasing){

        eraserBtn.classList.remove("btn-outline-danger");
        eraserBtn.classList.add("btn-danger");
        canvas.style.cursor = "crosshair";

    }else{

        eraserBtn.classList.remove("btn-danger");
        eraserBtn.classList.add("btn-outline-danger");
        canvas.style.cursor = "default";

    }

}

}


/* =============================
   POINTER POSITION
============================= */

function getPosition(e){

const rect = canvas.getBoundingClientRect();

if(e.touches){

return {
x: (e.touches[0].clientX - rect.left) / scale,
y: (e.touches[0].clientY - rect.top) / scale
}

}

return {
x: e.offsetX / scale,
y: e.offsetY / scale
}

}


/* =============================
   PINCH DISTANCE
============================= */

function getDistance(touches){

const dx = touches[0].clientX - touches[1].clientX;
const dy = touches[0].clientY - touches[1].clientY;

return Math.sqrt(dx*dx + dy*dy);

}


/* =============================
   DRAW EVENTS
============================= */

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mouseup", stopDraw);
canvas.addEventListener("mouseleave", stopDraw);
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", handleTouchStart);
canvas.addEventListener("touchend", stopDraw);
canvas.addEventListener("touchcancel", stopDraw);
canvas.addEventListener("touchmove", handleTouchMove);


/* =============================
   TOUCH START
============================= */

function handleTouchStart(e){

if(e.touches.length === 2){

isPinching = true;
startDistance = getDistance(e.touches);
return;

}

const now = new Date().getTime();
const tapLength = now - lastTap;

if(tapLength < 300 && tapLength > 0){

handleUndo();
lastTap = 0;
return;

}

lastTap = now;

startDraw(e);

}


/* =============================
   TOUCH MOVE
============================= */

function handleTouchMove(e){

if(isPinching && e.touches.length === 2){

e.preventDefault();

let newDistance = getDistance(e.touches);

let zoom = newDistance / startDistance;

scale *= zoom;

if(scale < 1) scale = 1;
if(scale > 5) scale = 5;

canvas.style.transform = `scale(${scale})`;

startDistance = newDistance;

return;

}

draw(e);

}


/* =============================
   START DRAW
============================= */

function startDraw(e){

if(isPinching) return;

e.preventDefault();

drawing = true;

const pos = getPosition(e);

ctx.beginPath();
ctx.moveTo(pos.x,pos.y);

}


/* =============================
   STOP DRAW
============================= */

function stopDraw(){

if(isPinching){

isPinching = false;
return;

}

if(drawing){
saveState();
}

drawing = false;
ctx.beginPath();

}


/* =============================
   DRAW
============================= */

function draw(e){

if(!drawing || isPinching) return;

e.preventDefault();

const pos = getPosition(e);

ctx.lineWidth = penSizeSelector.value;
ctx.lineCap = "round";

/* 👇 mark drawing exists */
hasDrawing = true;

if(erasing){

ctx.globalCompositeOperation = "destination-out";
ctx.strokeStyle = "rgba(0,0,0,1)";

}else{

ctx.globalCompositeOperation = "source-over";
ctx.strokeStyle = penColorPicker.value;

}

ctx.lineTo(pos.x,pos.y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(pos.x,pos.y);

}


/* =============================
   UNDO
============================= */

function handleUndo(){

if(history.length <= 1) return;

history.pop();

const previous = history[history.length-1];

const img = new Image();

img.onload = function(){

ctx.globalCompositeOperation="source-over";
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(img,0,0);

};

img.src = previous;

}

const undoBtn = document.getElementById("undoCanvas");

if(undoBtn){

undoBtn.onclick = handleUndo;

}


/* =============================
   CLEAR CANVAS
============================= */

const clearBtn = document.getElementById("clearCanvas");

if(clearBtn){

clearBtn.onclick = function(){

ctx.clearRect(0,0,canvas.width,canvas.height);

fillWhite();

/* reset drawing flag */
hasDrawing = false;

saveState();

}

}


/* =============================
   EXPORT CANVAS
============================= */

function exportCanvas(){

const tempCanvas = document.createElement("canvas");

tempCanvas.width = canvas.width;
tempCanvas.height = canvas.height;

const tempCtx = tempCanvas.getContext("2d");

tempCtx.fillStyle="#ffffff";
tempCtx.fillRect(0,0,tempCanvas.width,tempCanvas.height);

tempCtx.drawImage(canvas,0,0);

return tempCanvas.toDataURL("image/png");

}


/* =============================
   SAVE IMAGE TO FORM
============================= */

const form = document.getElementById("orderForm");

if(form){

form.addEventListener("submit",function(){

if(!hasDrawing){
document.getElementById("scratchCanvasImage").value = "";
return;
}

const dataURL = exportCanvas();

document.getElementById("scratchCanvasImage").value = dataURL;

});

}


/* =============================
   FULLSCREEN
============================= */

if(fullscreenBtn){

fullscreenBtn.onclick = function(){

if(!document.fullscreenElement){

canvasContainer.requestFullscreen();

}

}

}


if(exitFullscreenBtn){

exitFullscreenBtn.onclick = function(){

document.exitFullscreen();

}

}


/* =============================
   FULLSCREEN CHANGE
============================= */

document.addEventListener("fullscreenchange",function(){

const imageData = canvas.toDataURL();

if(document.fullscreenElement){

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

if(exitFullscreenBtn){
exitFullscreenBtn.style.display="block";
}

}else{

canvas.width = NORMAL_WIDTH;
canvas.height = NORMAL_HEIGHT;

if(exitFullscreenBtn){
exitFullscreenBtn.style.display="none";
}

}

fillWhite();

const img = new Image();

img.onload = function(){
ctx.drawImage(img,0,0,canvas.width,canvas.height);
};

img.src = imageData;

});

}

</script>










</body>
